  intl: ^0.20.2
  timezone: ^0.10.1
  hexcolor: ^3.0.1
  google_fonts: ^6.3.0
  dio: ^5.9.0
  cached_network_image: ^3.4.1
  json_annotation: any
  hive_flutter: ^1.1.0
