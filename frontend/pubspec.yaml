  shared_preferences: ^2.3.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  auto_route: ^10.1.0+1
  talker: ^5.0.0
  talker_flutter: ^5.0.0
  get_it: ^8.2.0
